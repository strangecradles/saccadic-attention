# Smoke test config — fast iteration for debugging

model:
  name: gpt2
  saccadic_layers: [6, 7, 8, 9, 10, 11]

saccadic:
  num_saccades: 3
  window_size: 64
  block_size: 32
  mask_fixated: false

gumbel:
  temp_start: 1.0
  temp_end: 0.1
  anneal_steps: 50

training:
  batch_size: 2
  max_steps: 100
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_steps: 10
  schedule: cosine
  gradient_clip: 1.0
  entropy_bonus: 0.01
  checkpoint_every: 50
  log_every: 10
  eval_every: 50

data:
  task: passkey
  context_lengths: [2048]
  train_context_length: 2048
  num_train_samples: 200
  num_eval_samples: 50

eval:
  context_lengths: [2048]

ablations:
  num_saccades: [1, 3]
  window_sizes: [64]
  controller_types: [learned]

logging:
  use_wandb: false
  project: saccadic-attention
  run_name: smoke-test
